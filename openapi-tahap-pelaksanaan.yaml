openapi: 3.0.0
info:
  title: SIKP Internship API - Tahap Pelaksanaan
  version: 1.3.0
  description: Dokumentasi lengkap API untuk tahap pelaksanaan magang (Execution Phase) hasil refactor ke Service-Based Architecture. Mencakup Logbook, Mentorship, Monitoring, Penilaian, Pelaporan, dan Arsip.

servers:
  - url: http://localhost:8787
    description: Local Development Server
  - url: https://api-sikp.university.ac.id
    description: Production Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    SuccessResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        data: { type: object }

    Logbook:
      type: object
      properties:
        id: { type: string }
        internshipId: { type: string }
        date: { type: string, format: date }
        activity: { type: string }
        description: { type: string }
        hours: { type: integer }
        status: { type: string, enum: [PENDING, APPROVED, REJECTED] }
        attachmentUrl: { type: string, nullable: true }
        rejectionReason: { type: string, nullable: true }
        verifiedBy: { type: string, nullable: true }
        verifiedAt: { type: string, format: date-time, nullable: true }

    InternshipData:
      type: object
      properties:
        internship:
          type: object
          properties:
            id: { type: string }
            companyName: { type: string }
            division: { type: string }
            startDate: { type: string, format: date }
            endDate: { type: string, format: date }
            status: { type: string }
        mahasiswa:
          type: object
          properties:
            nama: { type: string }
            nim: { type: string }
        mentor:
          type: object
          properties:
            nama: { type: string }
            instansi: { type: string }
        dosen:
          type: object
          properties:
            nama: { type: string }
            nip: { type: string }

    AssessmentInput:
      type: object
      required: [kehadiran, kerjasama, sikapEtika, prestasiKerja, kreatifitas]
      properties:
        studentUserId: { type: string, description: "Hanya untuk POST /assessments" }
        kehadiran: { type: integer, minimum: 0, maximum: 100 }
        kerjasama: { type: integer, minimum: 0, maximum: 100 }
        sikapEtika: { type: integer, minimum: 0, maximum: 100 }
        prestasiKerja: { type: integer, minimum: 0, maximum: 100 }
        kreatifitas: { type: integer, minimum: 0, maximum: 100 }
        feedback: { type: string }

paths:
  # ─── INTERNSHIP (Dasar & Dokumen) ──────────────────────────────────────────
  /api/internships:
    get:
      tags: [Internship]
      summary: Mendapatkan data pelaksanaan magang aktif mahasiswa
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InternshipData' }

  /api/internships/check-status:
    get:
      tags: [Internship]
      summary: Cek apakah logbook sudah penuh dan penilaian sudah diisi
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK

  /api/internships/generate/{type}:
    get:
      tags: [Internship]
      summary: Generate dokumen Logbook atau Penilaian (PDF/Docx)
      parameters:
        - name: type
          in: path
          required: true
          schema: { type: string, enum: [logbook, assessment] }
        - name: format
          in: query
          schema: { type: string, enum: [pdf, docx], default: pdf }
      responses:
        200:
          description: File stream

  # ─── LOGBOOKS (Mahasiswa) ──────────────────────────────────────────────────
  /api/logbooks:
    get:
      tags: [Logbooks]
      summary: List logbook harian
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK
    post:
      tags: [Logbooks]
      summary: Tambah logbook baru
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [date, activity, description]
              properties:
                date: { type: string, format: date }
                activity: { type: string }
                description: { type: string }
                hours: { type: integer }
      responses:
        201:
          description: Created

  /api/logbooks/stats:
    get:
      tags: [Logbooks]
      summary: Statistik akumulasi jam kerja
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK

  /api/logbooks/{id}:
    get:
      tags: [Logbooks]
      summary: Detail logbook
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: OK
    put:
      tags: [Logbooks]
      summary: Update logbook (Hanya jika status PENDING)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: OK
    delete:
      tags: [Logbooks]
      summary: Hapus logbook (Hanya jika status PENDING)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        204:
          description: Deleted

  /api/logbooks/{id}/photo:
    post:
      tags: [Logbooks]
      summary: Upload foto aktivitas logbook
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
      responses:
        200:
          description: Photo uploaded

  /api/logbooks/{id}/submit:
    post:
      tags: [Logbooks]
      summary: Kirim logbook ke mentor untuk verifikasi
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: Submitted

  # ─── MENTORSHIP (Pembimbing Lapangan) ──────────────────────────────────────
  /api/mentorship/profile:
    get:
      tags: [Mentorship]
      summary: Profil mentor aktif
    post:
      tags: [Mentorship]
      summary: Update profil mentor (Termasuk tanda tangan digital)

  /api/mentorship/profile/signature:
    post:
      tags: [Mentorship]
      summary: Upload file tanda tangan (E-Signature)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }

  /api/mentorship/mentees:
    get:
      tags: [Mentorship]
      summary: Daftar mahasiswa bimbingan aktif
    
  /api/mentorship/mentees/{studentId}:
    get:
      tags: [Mentorship]
      summary: Detail profil mahasiswa bimbingan

  /api/mentorship/mentees/{studentId}/logbooks:
    get:
      tags: [Mentorship]
      summary: Lihat history logbook mahasiswa tertentu

  /api/mentorship/logbooks/{logbookId}/approve:
    post:
      tags: [Mentorship]
      summary: Approve satu entri logbook

  /api/mentorship/logbooks/{logbookId}/reject:
    post:
      tags: [Mentorship]
      summary: Tolak logbook dengan alasan
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rejectionReason: { type: string }

  /api/mentorship/mentees/{studentId}/approve-all:
    post:
      tags: [Mentorship]
      summary: Approve semua logbook PENDING milik mahasiswa tersebut sekaligus

  /api/mentorship/assessments:
    post:
      tags: [Mentorship]
      summary: Memberikan penilaian akhir (30%) untuk mahasiswa
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssessmentInput' }

  /api/mentorship/assessments/{studentId}:
    get:
      tags: [Mentorship]
      summary: Melihat data penilaian yang sudah diberikan

  # ─── MONITORING (Dosen Pembimbing) ─────────────────────────────────────────
  /api/internship-monitoring/mentees:
    get:
      tags: [Monitoring]
      summary: Daftar mahasiswa bimbingan aktif beserta progresnya
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK

  /api/internship-monitoring/mentees/{studentId}/logbooks:
    get:
      tags: [Monitoring]
      summary: Rekap logbook mahasiswa bimbingan tertentu (ReadOnly)
      parameters:
        - name: studentId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: OK

  /api/internship-monitoring/inactive:
    get:
      tags: [Monitoring]
      summary: Mendapatkan daftar mahasiswa yang pasif dalam pengisian logbook
      parameters:
        - name: threshold
          in: query
          schema: { type: integer, default: 3 }
          description: Ambang batas hari ketidakaktifan
      responses:
        200:
          description: OK

  # ─── REPORTING (Judul & Laporan Akhir) ─────────────────────────────────────
  /api/reporting/submit-fast:
    post:
      tags: [Reporting]
      summary: Alur Cepat - Submit Judul & Upload Laporan Akhir sekaligus
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, file]
              properties:
                title: { type: string }
                abstract: { type: string }
                file: { type: string, format: binary }

  /api/reporting/score-fast:
    post:
      tags: [Reporting]
      summary: Dosen memberikan nilai laporan akhir (Fast Track)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [studentId, score]
              properties:
                studentId: { type: string }
                score: { type: integer }
                feedback: { type: string }

  # Standard Flow - Title
  /api/reporting/title:
    post:
      tags: [Reporting]
      summary: Pengajuan judul KP oleh mahasiswa (Standard Flow)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [internshipId, title]
              properties:
                internshipId: { type: string }
                title: { type: string }
                description: { type: string }
      responses:
        201:
          description: Created

  /api/reporting/title/{internshipId}:
    get:
      tags: [Reporting]
      summary: Mendapatkan data pengajuan judul berdasarkan ID Magang
      parameters:
        - name: internshipId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: OK

  /api/reporting/title/{id}/approve:
    post:
      tags: [Reporting]
      summary: Persetujuan judul oleh Dosen Pembimbing
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: Approved

  /api/reporting/title/{id}/reject:
    post:
      tags: [Reporting]
      summary: Penolakan judul oleh Dosen Pembimbing
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        200:
          description: Rejected

  # Standard Flow - Report
  /api/reporting/report:
    post:
      tags: [Reporting]
      summary: Unggah Laporan Akhir KP (Standard Flow)
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required: [internshipId, file]
              properties:
                internshipId: { type: string }
                file: { type: string, format: binary }
                title: { type: string, description: "Opsional, jika ingin mengubah judul saat submit laporan" }
                abstract: { type: string, description: "Opsional" }
      responses:
        201:
          description: Created

  /api/reporting/report/{internshipId}:
    get:
      tags: [Reporting]
      summary: Mendapatkan data laporan akhir berdasarkan ID Magang
      parameters:
        - name: internshipId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: OK

  # ─── PENILAIAN (Hasil Akhir & Rekap) ───────────────────────────────────────
  /api/penilaian/kriteria:
    get:
      tags: [Penilaian]
      summary: Mendapatkan kriteria penilaian beserta bobotnya
      security: [{ bearerAuth: [] }]
      responses:
        200:
          description: OK

  /api/penilaian/recap/{internshipId}:
    get:
      tags: [Penilaian]
      summary: Rekapitulasi nilai akhir (Mentor + Dosen + Gabungan)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: internshipId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: OK

  /api/penilaian/print/{internshipId}:
    get:
      tags: [Penilaian]
      summary: Download PDF Rekapitulasi Nilai Akhir
      security: [{ bearerAuth: [] }]
      parameters:
        - name: internshipId
          in: path
          required: true
          schema: { type: string }
      responses:
        200:
          description: PDF File
          content:
            application/pdf:
              schema: { type: string, format: binary }

  # ─── ARCHIVE (Riwayat & Pengarsipan) ───────────────────────────────────────
  /api/archive/student:
    get:
      tags: [Archive]
      summary: Mendapatkan riwayat pengajuan dan pelaksanaan mahasiswa (Selesai/Batal)
      security: [{ bearerAuth: [] }]

  /api/archive/admin/internships:
    get:
      tags: [Archive]
      summary: (Admin) Daftar seluruh pelaksanaan magang yang sudah selesai/diarsipkan

  /api/archive/admin/submissions:
    get:
      tags: [Archive]
      summary: (Admin) Daftar seluruh pengajuan surat yang sudah selesai/diarsipkan
